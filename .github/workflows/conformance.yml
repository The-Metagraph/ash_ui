name: Conformance

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ash_ui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ash_ui_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
      DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
      DIFF_HEAD: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          version-type: strict
          version-file: .tool-versions

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install deps
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Prepare test environment
        run: PREPARE_RUN_DEPS=false ./scripts/prepare_test_environment.sh

      - name: Run conformance harness
        run: CONFORMANCE_PREPARE_ENV=false ./scripts/run_conformance.sh

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: reports/conformance
